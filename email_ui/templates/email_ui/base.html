<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Почта</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        .email-row:hover { background-color: #f5f5f5; cursor: pointer; }
        .unread { font-weight: bold; }
        .sidebar { min-height: 100vh; border-right: 1px solid #dee2e6; }

        .split-panel { display: flex; height: calc(100vh - 56px); overflow: hidden; }
        .list-panel { flex: 0 0 420px; border-right: 1px solid #dee2e6; display: flex; flex-direction: column; overflow: hidden; }
        .list-panel-header { flex: 0 0 auto; }
        .list-panel-body { flex: 1; overflow-y: auto; }
        .detail-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .detail-content { flex: 1; overflow-y: auto; }

        .compose-panel { display: flex; flex-direction: column; height: 100%; }
        .compose-header { flex: 0 0 auto; padding: 12px 16px; border-bottom: 1px solid #dee2e6; background: #f8f9fa; }
        .compose-fields { flex: 0 0 auto; padding: 12px 16px; border-bottom: 1px solid #eee; }
        .compose-editor { flex: 1; overflow-y: auto; padding: 16px; }
        .compose-editor textarea { border: none; resize: none; outline: none; font-size: 14px; width: 100%; min-height: 100%; }
        .compose-editor textarea:focus { box-shadow: none; }
        .compose-footer { flex: 0 0 auto; padding: 12px 16px; border-bottom: 1px solid #dee2e6; background: #f8f9fa; }

        .detail-toolbar { padding: 10px 16px; border-bottom: 1px solid #dee2e6; background: #f8f9fa; }
        .detail-meta { padding: 16px; }
        .detail-body { padding: 0 16px 16px 16px; }

        .collapsible-section { border: 1px solid #dee2e6; border-radius: 6px; margin-bottom: 8px; }
        .collapsible-section .section-header { padding: 8px 12px; cursor: pointer; background: #f8f9fa; border-radius: 6px; display: flex; align-items: center; justify-content: space-between; user-select: none; }
        .collapsible-section .section-header:hover { background: #e9ecef; }
        .collapsible-section .section-header .bi { transition: transform 0.2s; }
        .collapsible-section .section-header.collapsed .bi-chevron-down { transform: rotate(-90deg); }
        .collapsible-section .section-body { padding: 8px 12px; display: none; }
        .collapsible-section .section-body.show { display: block; }

        .empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: #6c757d; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark px-3">
        <span class="navbar-brand mb-0 h1">
            <i class="bi bi-envelope"></i> Почтовый клиент
        </span>
        <div class="d-flex align-items-center">
            <a href="/admin/" class="btn btn-outline-light btn-sm me-2">
                <i class="bi bi-gear"></i> Админ панель
            </a>
            <a href="/admin/Emails/email/" class="btn btn-outline-light btn-sm">
                <i class="bi bi-inboxes"></i> БД писем
            </a>
        </div>
    </nav>

    <div class="split-panel">
        <div class="col-md-2 p-0 sidebar bg-light" style="flex: 0 0 180px; min-height: 100%;">
            {% include "email_ui/partials/sidebar.html" %}
        </div>
        <div class="col-md-10 p-0">
            {% block content %}{% endblock %}
        </div>
    </div>

    <div class="modal fade" id="taskModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content" id="task-modal-container"></div>
        </div>
    </div>
    <div class="modal fade" id="dynamicModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content" id="dynamicModalContent"></div>
        </div>
    </div>

    <div class="modal fade" id="draftConfirmModal" tabindex="-1">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header py-2">
                    <h6 class="modal-title">Несохранённое письмо</h6>
                </div>
                <div class="modal-body py-2">
                    <p class="mb-0">Сохранить черновик перед закрытием?</p>
                </div>
                <div class="modal-footer py-2">
                    <button type="button" class="btn btn-sm btn-secondary" id="draft-discard-btn">Нет</button>
                    <button type="button" class="btn btn-sm btn-primary" id="draft-save-btn">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<meta name="csrf-token" content="{{ csrf_token }}">
<script>
    document.body.addEventListener('htmx:configRequest', (evt) => {
        evt.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
    });

    window.EmailApp = {
        isDirty: false,
        pendingAction: null,
        draftFormId: null,

        markDirty: function() { this.isDirty = true; },
        clearDirty: function() { this.isDirty = false; },

        loadContent: function(url) {
            htmx.ajax('GET', url, { target: '#detail-content', swap: 'innerHTML' });
        },

        checkDirtyThen: function(callback) {
            if (!this.isDirty) { callback(); return; }
            this.pendingAction = callback;
            var modal = new bootstrap.Modal(document.getElementById('draftConfirmModal'));
            modal.show();
        },

        openEmail: function(url) {
            this.checkDirtyThen(() => {
                this.clearDirty();
                this.loadContent(url);
            });
        },

        openCompose: function(url) {
            this.checkDirtyThen(() => {
                this.clearDirty();
                this.loadContent(url);
            });
        },

        openReply: function(url) {
            this.checkDirtyThen(() => {
                this.clearDirty();
                this.loadContent(url);
            });
        }
    };

    document.getElementById('draft-save-btn').addEventListener('click', function() {
        var modal = bootstrap.Modal.getInstance(document.getElementById('draftConfirmModal'));
        modal.hide();
        var form = document.getElementById('compose-form');
        if (form) {
            fetch('{% url "email_ui:save_draft" %}', {
                method: 'POST',
                headers: {'X-CSRFToken': '{{ csrf_token }}', 'Content-Type': 'application/x-www-form-urlencoded'},
                body: new URLSearchParams(new FormData(form))
            }).then(() => {
                EmailApp.clearDirty();
                if (EmailApp.pendingAction) {
                    EmailApp.pendingAction();
                    EmailApp.pendingAction = null;
                }
            });
        } else {
            EmailApp.clearDirty();
            if (EmailApp.pendingAction) {
                EmailApp.pendingAction();
                EmailApp.pendingAction = null;
            }
        }
    });

    document.getElementById('draft-discard-btn').addEventListener('click', function() {
        var modal = bootstrap.Modal.getInstance(document.getElementById('draftConfirmModal'));
        modal.hide();
        EmailApp.clearDirty();
        if (EmailApp.pendingAction) {
            EmailApp.pendingAction();
            EmailApp.pendingAction = null;
        }
    });

    document.getElementById('draftConfirmModal').addEventListener('hide.bs.modal', function() {
        EmailApp.pendingAction = null;
    });
</script>
</body>
</html>
