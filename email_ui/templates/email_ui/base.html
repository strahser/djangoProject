<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Почта</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        .email-row:hover { background-color: #f5f5f5; cursor: pointer; }
        .unread { font-weight: bold; }
        .sidebar { min-height: 100vh; border-right: 1px solid #dee2e6; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Боковая панель -->
            <div class="col-md-2 p-0 sidebar bg-light">
                {% include "email_ui/partials/sidebar.html" %}
            </div>
            <!-- Основной контент -->
            <div class="col-md-10 p-3">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <!-- Модальное окно для просмотра письма -->
    <div class="modal fade" id="emailModal" tabindex="-1" aria-labelledby="emailModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <!-- Сюда будет загружаться содержимое письма -->
            </div>
        </div>
    </div>

    <!-- Модальное окно для задач -->
    <div class="modal fade" id="taskModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content" id="task-modal-container"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
