<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Почта</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        .email-row:hover { background-color: #f5f5f5; cursor: pointer; }
        .unread { font-weight: bold; }
        .sidebar { min-height: 100vh; border-right: 1px solid #dee2e6; }

        /* ===== Split-panel layout ===== */
        .split-panel { display: flex; height: calc(100vh - 56px); overflow: hidden; }
        .list-panel { flex: 0 0 420px; border-right: 1px solid #dee2e6; display: flex; flex-direction: column; overflow: hidden; }
        .list-panel-header { flex: 0 0 auto; }
        .list-panel-body { flex: 1; overflow-y: auto; }
        .detail-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* ===== Tabs for multi-window ===== */
        .detail-tabs { flex: 0 0 auto; display: flex; align-items: center; border-bottom: 1px solid #dee2e6; background: #f8f9fa; min-height: 42px; }
        .detail-tabs .nav-tabs { border: none; margin: 0; padding: 0 8px; flex: 1; overflow-x: auto; white-space: nowrap; }
        .detail-tabs .nav-tabs .nav-link { border: none; border-radius: 0; padding: 8px 14px; font-size: 13px; max-width: 160px; overflow: hidden; text-overflow: ellipsis; }
        .detail-tabs .nav-tabs .nav-link.active { background: #fff; border-bottom: 2px solid #0d6efd; }
        .detail-tabs .nav-tabs .nav-link .tab-close { margin-left: 6px; font-size: 11px; opacity: 0.5; }
        .detail-tabs .nav-tabs .nav-link:hover .tab-close { opacity: 1; }

        /* ===== Detail / Compose panel ===== */
        .detail-content { flex: 1; overflow-y: auto; padding: 16px; }
        .compose-panel { flex: 1; display: flex; flex-direction: column; }
        .compose-header { flex: 0 0 auto; padding: 12px 16px; border-bottom: 1px solid #dee2e6; background: #f8f9fa; }
        .compose-body { flex: 1; overflow-y: auto; padding: 16px; }
        .compose-footer { flex: 0 0 auto; padding: 12px 16px; border-top: 1px solid #dee2e6; background: #f8f9fa; }
        .compose-body textarea { border: none; resize: none; outline: none; font-size: 14px; min-height: 300px; }
        .compose-body textarea:focus { box-shadow: none; }

        /* ===== Collapsible sections ===== */
        .collapsible-section { border: 1px solid #dee2e6; border-radius: 6px; margin-bottom: 8px; }
        .collapsible-section .section-header { padding: 8px 12px; cursor: pointer; background: #f8f9fa; border-radius: 6px; display: flex; align-items: center; justify-content: space-between; user-select: none; }
        .collapsible-section .section-header:hover { background: #e9ecef; }
        .collapsible-section .section-header .bi { transition: transform 0.2s; }
        .collapsible-section .section-header.collapsed .bi-chevron-down { transform: rotate(-90deg); }
        .collapsible-section .section-body { padding: 8px 12px; display: none; }
        .collapsible-section .section-body.show { display: block; }

        /* ===== Empty state ===== */
        .empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: #6c757d; }
    </style>
</head>
<body>
    <!-- Верхняя навигационная панель -->
    <nav class="navbar navbar-dark bg-dark px-3">
        <span class="navbar-brand mb-0 h1">
            <i class="bi bi-envelope"></i> Почтовый клиент
        </span>
        <div class="d-flex align-items-center">
            <a href="/admin/" class="btn btn-outline-light btn-sm me-2">
                <i class="bi bi-gear"></i> Админ панель
            </a>
            <a href="/admin/Emails/email/" class="btn btn-outline-light btn-sm">
                <i class="bi bi-inboxes"></i> БД писем
            </a>
        </div>
    </nav>

    <div class="split-panel">
        <!-- Боковая панель -->
        <div class="col-md-2 p-0 sidebar bg-light" style="flex: 0 0 180px; min-height: 100%;">
            {% include "email_ui/partials/sidebar.html" %}
        </div>

        <!-- Основной контент -->
        <div class="col-md-10 p-0">
            {% block content %}{% endblock %}
        </div>
    </div>

    <!-- Модальное окно для задач (оставляем модалкой - это вспомогательное) -->
    <div class="modal fade" id="taskModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content" id="task-modal-container"></div>
        </div>
    </div>

    <!-- Модальное окно для выбора фильтров (оставляем модалкой) -->
    <div class="modal fade" id="dynamicModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content" id="dynamicModalContent"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<meta name="csrf-token" content="{{ csrf_token }}">
<script>
    document.body.addEventListener('htmx:configRequest', (evt) => {
        evt.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
    });

    /* ===== Multi-tab system ===== */
    window.MailApp = {
        tabs: [],
        activeTab: null,

        openTab: function(id, title, url) {
            // Check if tab already exists
            let existing = this.tabs.find(t => t.id === id);
            if (existing) {
                this.activateTab(id);
                return;
            }
            // Create new tab
            this.tabs.push({ id, title, url });
            this.activateTab(id);
            // Load content via HTMX
            htmx.ajax('GET', url, { target: '#detail-content', swap: 'innerHTML' });
        },

        activateTab: function(id) {
            this.activeTab = id;
            this.renderTabs();
            // Show/hide panels
            let tab = this.tabs.find(t => t.id === id);
            if (tab) {
                // Load content
                htmx.ajax('GET', tab.url, { target: '#detail-content', swap: 'innerHTML' });
            }
        },

        closeTab: function(id, evt) {
            if (evt) evt.stopPropagation();
            this.tabs = this.tabs.filter(t => t.id !== id);
            if (this.activeTab === id) {
                if (this.tabs.length > 0) {
                    this.activateTab(this.tabs[this.tabs.length - 1].id);
                } else {
                    this.activeTab = null;
                    document.getElementById('detail-content').innerHTML = '<div class="empty-state"><div class="text-center"><i class="bi bi-envelope" style="font-size:48px"></i><p class="mt-2">Выберите письмо</p></div></div>';
                }
            }
            this.renderTabs();
        },

        renderTabs: function() {
            let container = document.getElementById('detail-tabs-list');
            if (!container) return;
            let html = '';
            this.tabs.forEach(tab => {
                let active = tab.id === this.activeTab ? ' active' : '';
                let short = tab.title.length > 20 ? tab.title.substring(0, 20) + '...' : tab.title;
                html += '<li class="nav-item">';
                html += '<a class="nav-link' + active + '" href="#" onclick="MailApp.activateTab(\'' + tab.id + '\'); return false;">';
                html += short;
                html += '<span class="tab-close" onclick="MailApp.closeTab(\'' + tab.id + '\', event)">&times;</span>';
                html += '</a></li>';
            });
            container.innerHTML = html;
        }
    };
</script>
</body>
</html>
