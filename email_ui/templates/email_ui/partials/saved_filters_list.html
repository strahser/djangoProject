<div class="list-group">
    {% for sf in filters %}
    <div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-2">
        <a href="{% url 'email_ui:apply_saved_filter' sf.id %}" class="text-decoration-none stretched-link">
            <i class="bi bi-funnel"></i> {{ sf.name }}
        </a>
        <small class="text-muted">{{ sf.folder }}</small>
    </div>
    {% empty %}
    <div class="text-muted text-center py-3">Нет сохранённых фильтров</div>
    {% endfor %}
</div>
