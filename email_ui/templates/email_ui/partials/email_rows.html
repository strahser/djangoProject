{% for email in page_obj %}
<tr class="{% if not email.is_read %}unread{% endif %}">
    <td>
        <input type="checkbox" name="selected_emails" value="{{ email.pk }}" form="bulk-form">
    </td>
    <td>{{ email.sender|default:"Неизвестно" }}</td>
    <td>
        <a href="#"
           data-bs-toggle="modal"
           data-bs-target="#emailModal"
           hx-get="{% url 'email_ui:email_detail_modal' email.pk %}"
           hx-target="#emailModal .modal-content"
           hx-trigger="click">
            {{ email.subject|truncatechars:50 }}
        </a>
    </td>
    <td>{{ email.email_stamp|date:"d.m.Y H:i" }}</td>
    <td>{% if email.attachments.all %}<span class="badge bg-secondary">📎</span>{% endif %}</td>
</tr>
{% endfor %}

{% if page_obj.has_next %}
<!-- Новый индикатор для следующей страницы -->
<tr id="load-marker"
    hx-get="{% url 'email_ui:email_list_partial' %}?page={{ page_obj.next_page_number }}&{{ request.GET.urlencode }}&_infinite=1"
    hx-trigger="revealed"
    hx-target="#load-marker"
    hx-swap="outerHTML">
    <td colspan="5" class="text-center">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Загрузка...</span>
        </div>
    </td>
</tr>
{% endif %}
