<!-- ProjectTDL/templates/ProjectTDL/report_with_layout.html -->
{% extends "base.html" %}
{% load static %}

{% block title %}Отчет по задачам{% endblock %}

{% block custom-css %}
    {{ block.super }}
    <style>
        /* Сброс стилей base.html для отчета */
        #content-wrapper {
            margin: 0;
            padding: 0;
            background: none;
        }

        #content {
            margin: 0;
            padding: 0;
            min-height: auto;
        }

        /* Стили отчета из base_report.html */
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        .header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            border-radius: 5px;
        }
        .summary-section {
            margin: 30px 0;
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        .task-block {
            border: 1px solid #ddd;
            margin: 20px 0;
            padding: 20px;
            border-radius: 5px;
        }
        .task-header {
            background-color: #f8f9fa;
            padding: 15px;
            border-left: 4px solid #3498db;
            position: relative;
        }
        .section {
            margin: 15px 0;
        }
        .section-title {
            color: #2c3e50;
            border-bottom: 2px solid #eee;
            padding-bottom: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
        }
        th {
            background-color: #f2f2f2;
            text-align: left;
            padding: 12px 8px;
        }
        td {
            padding: 10px 8px;
            border-bottom: 1px solid #ddd;
        }
        .total {
            font-weight: bold;
            background-color: #e8f4fc;
            padding: 15px;
            border-radius: 3px;
            margin: 20px 0;
        }
        .no-data {
            color: #999;
            font-style: italic;
        }
        .status-active {
            color: #27ae60;
        }
        .status-completed {
            color: #3498db;
        }
        .status-overdue {
            color: #e74c3c;
        }
        .summary-table tr:hover {
            background-color: #f5f5f5;
            cursor: pointer;
        }
        .nav-button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 3px;
            cursor: pointer;
            margin: 5px;
        }
        .nav-button:hover {
            background-color: #2980b9;
        }
        .task-nav {
            position: absolute;
            top: 15px;
            right: 15px;
        }
        .expand-button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            margin: 2px;
        }
        .collapse-button {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            margin: 2px;
        }
        .task-details {
            display: none;
            margin-top: 15px;
        }
        .task-details.expanded {
            display: block;
        }
        .summary-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .stat-box {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            flex: 1;
            margin: 0 10px;
            text-align: center;
        }
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
        }
        .stat-label {
            color: #7f8c8d;
            font-size: 14px;
        }
        .jump-to-task {
            margin-left: 10px;
            font-size: 12px;
            color: #3498db;
            cursor: pointer;
            text-decoration: underline;
        }
        .back-to-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #3498db;
            color: white;
            padding: 10px;
            border-radius: 50%;
            text-decoration: none;
            display: none;
        }
        .controls-container {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .control-button {
            padding: 10px 15px;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .admin-link-btn {
            background-color: #34495e;
            text-decoration: none;
            padding: 10px 15px;
            color: white;
            border-radius: 3px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .home-link-btn {
            background-color: #16a085;
            text-decoration: none;
            padding: 10px 15px;
            color: white;
            border-radius: 3px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
    </style>
{% endblock %}

{% block content %}
    <!-- Весь контент отчета -->
    {% include "ProjectTDL/report_content.html" %}
{% endblock %}

{% block custom-js %}
    {{ block.super }}
    <script>
        {% block javascript %}{% endblock %}

        // Общие функции для отчета
        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }

        // Показываем кнопку "Наверх" при прокрутке
        window.addEventListener('scroll', function() {
            const backToTopBtn = document.getElementById('back-to-top');
            if (window.pageYOffset > 300) {
                backToTopBtn.style.display = 'block';
            } else {
                backToTopBtn.style.display = 'none';
            }
        });
    </script>
{% endblock %}
